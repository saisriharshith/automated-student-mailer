<!DOCTYPE html>
<html>
<head>
  <title>Student Mailer — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; color: #1a1a1a; }
    .card { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 2rem; width: 100%; max-width: 360px; }
    .card-header { margin-bottom: 1.5rem; }
    .card-header h1 { font-size: 20px; font-weight: 500; }
    .card-header p { font-size: 14px; color: #888; margin-top: 4px; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 6px; }
    .field input { width: 100%; padding: 9px 12px; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px; font-size: 14px; outline: none; background: #fff; color: #1a1a1a; }
    .field input:focus { border-color: rgba(0,0,0,0.4); }
    .submit-btn { width: 100%; margin-top: 1.25rem; padding: 10px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
    .submit-btn:hover { opacity: 0.85; }
    .error { background: #fcebeb; border: 0.5px solid rgba(163,45,45,0.3); border-radius: 8px; padding: 0.75rem 1rem; font-size: 13px; color: #a32d2d; margin-bottom: 1rem; }
  </style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <h1>Professor login</h1>
    <p>Sign in to access the mailer.</p>
  </div>

  {% if form.errors %}
  <div class="error">Invalid username or password. Please try again.</div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="field">
      <label for="id_username">Username</label>
      <input type="text" name="username" id="id_username" autofocus>
    </div>
    <div class="field">
      <label for="id_password">Password</label>
      <input type="password" name="password" id="id_password">
    </div>
    <button type="submit" class="submit-btn">Sign in</button>
    <div class="login-link" style="text-align:center; margin-top:1rem; font-size:13px; color:#888;">
  No account? <a href="/signup/" style="color:#1a1a1a; font-weight:500;">Sign up</a>
</div>
  </form>
</div>
</body>
</html>
