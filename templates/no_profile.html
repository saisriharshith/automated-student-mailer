<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Mailer — No Profile</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; color: #1a1a1a; }
    .card { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 2rem; width: 100%; max-width: 420px; }
    .icon { width: 44px; height: 44px; background: #fcebeb; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 1.25rem; }
    .icon svg { width: 22px; height: 22px; stroke: #a32d2d; fill: none; stroke-width: 1.5; }
    h1 { font-size: 18px; font-weight: 500; margin-bottom: 0.5rem; }
    p { font-size: 14px; color: #666; line-height: 1.6; }
    .email { font-family: monospace; font-size: 13px; background: #f5f5f3; padding: 2px 6px; border-radius: 4px; color: #1a1a1a; }
    .steps { margin-top: 1.25rem; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; }
    .step { padding: 0.75rem 1rem; font-size: 13px; color: #444; border-bottom: 0.5px solid rgba(0,0,0,0.07); display: flex; gap: 10px; align-items: flex-start; }
    .step:last-child { border-bottom: none; }
    .step-num { font-size: 12px; font-weight: 500; color: #888; min-width: 18px; }
    .signout-btn { width: 100%; margin-top: 1.25rem; padding: 9px; background: none; color: #888; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px; font-size: 14px; cursor: pointer; font-family: inherit; transition: background 0.15s; }
    .signout-btn:hover { background: #efefed; }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
  </div>
  <h1>Profile not set up</h1>
  <p>Your account (<span class="email">{{ email|default:username }}</span>) does not have a Professor profile linked yet. Ask the admin to set it up.</p>

  <div class="steps">
    <div class="step"><span class="step-num">1</span>Admin goes to /admin/</div>
    <div class="step"><span class="step-num">2</span>Opens Professors → Add Professor</div>
    <div class="step"><span class="step-num">3</span>Links your user account and adds your Gmail app password</div>
  </div>

  <form method="POST" action="/accounts/logout/" style="margin:0">
    {% csrf_token %}
    <button type="submit" class="signout-btn">Sign out</button>
  </form>
</div>
</body>
</html>
