<!DOCTYPE html>
<html>
<head>
  <title>Student Mailer — Done</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; min-height: 100vh; padding: 2rem 1rem; color: #1a1a1a; }
    .page { max-width: 720px; margin: 0 auto; }

    .header { margin-bottom: 2rem; }
    .header h1 { font-size: 22px; font-weight: 500; }
    .header p { font-size: 14px; color: #666; margin-top: 4px; }

    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
    .stat { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 1.25rem; }
    .stat-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
    .stat-value { font-size: 28px; font-weight: 500; }
    .stat-value.green { color: #3b6d11; }
    .stat-value.red { color: #a32d2d; }

    .card { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .card-title { font-size: 15px; font-weight: 500; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 0.5px solid rgba(0,0,0,0.1); }

    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    thead th { text-align: left; padding: 0 0.75rem 0.75rem; font-size: 12px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 0.5px solid rgba(0,0,0,0.15); }
    tbody td { padding: 0.75rem; border-bottom: 0.5px solid rgba(0,0,0,0.07); }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #f9f9f7; }
    .enroll { font-family: monospace; font-size: 12px; color: #888; }

    .back-btn { display: inline-block; padding: 9px 18px; background: #1a1a1a; color: #fff; border-radius: 8px; font-size: 14px; text-decoration: none; }
    .back-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
<div class="page">

  <div class="header">
    <h1>Student mailer</h1>
    <p>Here's a summary of the email delivery.</p>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Sent</div>
      <div class="stat-value green">{{ success_count }}</div>
    </div>
    <div class="stat">
      <div class="stat-label">Failed</div>
      <div class="stat-value {% if fail_count %}red{% else %}green{% endif %}">{{ fail_count }}</div>
    </div>
  </div>

  {% if data %}
  <div class="card">
    <div class="card-title">Student records</div>
    <table>
      <thead>
        <tr>
          <th>Enrollment</th>
          <th>Name</th>
          <th>Email</th>
          <th>Marks</th>
        </tr>
      </thead>
      <tbody>
        {% for row in data %}
        <tr>
          <td><span class="enroll">{{ row.0 }}</span></td>
          <td>{{ row.1 }}</td>
          <td style="color:#888">{{ row.2 }}</td>
          <td><strong>{{ row.3 }}</strong></td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
  {% endif %}

  <a href="/" class="back-btn">Upload another file</a>

</div>
</body>
</html>
